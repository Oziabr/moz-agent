<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>moz-agent</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <h1>moz-agent</h1>
    <p id="domain" class="domain"></p>
    <p id="status" class="status"></p>

    <label class="toggle-row">
      <span>Enable on this domain</span>
      <input type="checkbox" id="enable-toggle">
    </label>

    <label class="toggle-row">
      <span>Allow form submission</span>
      <input type="checkbox" id="write-toggle">
    </label>

    <script src="popup.js"></script>
  </body>
</html>
