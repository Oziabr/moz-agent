<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>moz-agent</title>
    <style>
      body { font-family: system-ui, sans-serif; max-width: 480px; margin: 48px auto; padding: 0 16px; }
      h1 { font-size: 18px; }
      input { padding: 6px; width: 100%; box-sizing: border-box; margin-bottom: 8px; }
      button { padding: 6px 12px; cursor: pointer; }
      table { width: 100%; border-collapse: collapse; margin-top: 12px; }
      th, td { text-align: left; padding: 6px 4px; border-bottom: 1px solid #eee; font-size: 13px; }
      #login-status { font-size: 12px; color: #666; min-height: 16px; }
      #whoami { font-size: 12px; color: #666; }
    </style>
  </head>
  <body>
    <h1>moz-agent</h1>

    <section id="login-section">
      <form id="login-form">
        <input type="email" id="login-email" placeholder="you@example.com" required>
        <input type="password" id="login-password" placeholder="password" required minlength="6">
        <button type="submit">Log in</button>
        <button type="button" id="signup-button">Sign up</button>
      </form>
      <p id="login-status"></p>
    </section>

    <section id="domains-section" hidden>
      <p id="whoami"></p>
      <button id="logout-button">Log out</button>
      <table>
        <thead>
          <tr><th>Domain</th><th>Enabled</th><th>Allow write</th></tr>
        </thead>
        <tbody id="domains-body"></tbody>
      </table>
    </section>

    <script type="module" src="app.js"></script>
  </body>
</html>
